spring.datasource.url=jdbc:h2:mem:vocabdb-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

spring.cache.type=simple
app.enrichment.enabled=false
app.api.libretranslate.base-url=
app.api.wiktapi.base-url=
app.api.pixabay.key=
app.api.pexels.key=
app.enrichment.image-storage-dir=${java.io.tmpdir}/fsrspring-test-images
app.enrichment.image-public-prefix=/generated-images/
spring.session.store-type=none
spring.data.redis.repositories.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.session.SessionAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
debug=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.springframework=INFO
