spring.application.name=FSRSpring Vocabulary

# MySQL Database
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:fsrspring_vocab}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.h2.console.enabled=false

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Dialect auto-detected by Hibernate 6+ — no need to specify explicitly

# Initialize data
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.jpa.defer-datasource-initialization=true

# Server
server.port=${PORT:8080}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:/}
server.forward-headers-strategy=framework

# External learning APIs
app.api.youtube.key=${YOUTUBE_API_KEY:}
app.api.youtube.base-url=https://www.googleapis.com/youtube/v3
app.api.news.key=${NEWS_API_KEY:}
app.api.news.base-url=https://newsapi.org/v2
app.api.libretranslate.base-url=${APP_API_LIBRETRANSLATE_BASE_URL:http://localhost:5000}
app.api.wiktapi.base-url=${APP_API_WIKTAPI_BASE_URL:https://api.wiktapi.dev}
app.api.pixabay.base-url=https://pixabay.com/api/
app.api.pixabay.key=${APP_API_PIXABAY_KEY:}
app.api.pexels.base-url=https://api.pexels.com/v1
app.api.pexels.key=${APP_API_PEXELS_KEY:}
app.enrichment.enabled=${APP_ENRICHMENT_ENABLED:false}
app.enrichment.store-images-locally=${APP_ENRICHMENT_STORE_IMAGES_LOCALLY:true}
app.enrichment.image-storage-dir=${APP_ENRICHMENT_IMAGE_STORAGE_DIR:data/enrichment-images}
app.enrichment.image-public-prefix=${APP_ENRICHMENT_IMAGE_PUBLIC_PREFIX:/generated-images/}
app.enrichment.poll-delay-ms=${APP_ENRICHMENT_POLL_DELAY_MS:10000}

# Reminder settings
app.reminder.default-email=${DEFAULT_REMINDER_EMAIL:learner@example.com}
app.reminder.cron=0 */30 * * * *

# Spring cache
spring.cache.type=simple

# Mail (configure in environment for production)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-oauth-not-configured}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-oauth-not-configured}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${app.frontend.base-url}/login/oauth2/code/{registrationId}

# Redis & Spring Session
# REDIS_URL takes precedence (Railway injects this); host/port/password are fallbacks for local dev
spring.data.redis.url=${REDIS_URL:}
spring.data.redis.host=${REDISHOST:localhost}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD:}
spring.data.redis.repositories.enabled=false
spring.session.store-type=redis
spring.session.redis.namespace=spring:session:fsrspring
spring.session.redis.flush-mode=on-save
spring.session.redis.save-mode=on-set-attribute

