spring.application.name=FSRSpring Vocabulary

# H2 Database
spring.datasource.url=jdbc:h2:mem:vocabdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Initialize data
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Server
server.port=8080

# External learning APIs
app.api.youtube.key=${YOUTUBE_API_KEY:}
app.api.youtube.base-url=https://www.googleapis.com/youtube/v3
app.api.news.key=${NEWS_API_KEY:}
app.api.news.base-url=https://newsapi.org/v2

# Reminder settings
app.reminder.default-email=${DEFAULT_REMINDER_EMAIL:learner@example.com}
app.reminder.cron=0 */30 * * * *

# Spring cache
spring.cache.type=simple

# Mail (configure in environment for production)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
