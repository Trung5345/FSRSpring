<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
    <nav class="border-b border-slate-200 bg-white">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4">
            <a href="/" class="font-display text-xl">VocabSmart FSRS</a>
            <div class="hidden gap-5 text-sm font-medium md:flex">
                <a href="/vocabulary">Vocabulary</a>
                <a href="/learn">Study</a>
                <a href="/quiz">Quiz</a>
                <a href="/progress">Progress</a>
                <a href="/content" class="text-indigo-700">Content Hub</a>
                <a href="/flashcards">Flashcards</a>
            </div>
        </div>
    </nav>

    <main class="mx-auto max-w-7xl px-4 py-8">
        <h1 class="font-display text-3xl">English Content Hub</h1>
        <p class="mt-1 text-slate-500">Discover YouTube and News content aligned to your vocabulary goals.</p>

        <div class="mt-4 flex flex-wrap gap-3">
            <input id="topicInput" class="input w-72" value="vocabulary" placeholder="Topic">
            <button onclick="loadContent()" class="rounded-xl bg-indigo-700 px-5 py-2.5 font-semibold text-white">Load content</button>
        </div>

        <section class="mt-6 grid gap-6 lg:grid-cols-2">
            <article class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
                <h2 class="font-display text-2xl">YouTube</h2>
                <div id="youtubeList" class="mt-4 space-y-3"></div>
            </article>
            <article class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
                <h2 class="font-display text-2xl">News</h2>
                <div id="newsList" class="mt-4 space-y-3"></div>
            </article>
        </section>
    </main>

    <script src="/js/content.js"></script>
</body>
</html>
