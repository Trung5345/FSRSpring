<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary — VocabSmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="nav">
    <div class="nav-inner">
        <a href="/" class="nav-brand">
            <span class="nav-brand-icon"></span>
            <span>VocabSmart</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/vocabulary" class="nav-link active">Vocabulary</a>
            <a href="/learn" class="nav-link">Study</a>
            <a href="/flashcard-study" class="nav-link">Cards</a>
            <a href="/sets" class="nav-link">Sets</a>
            <a href="/quiz" class="nav-link">Quiz</a>
            <a href="/progress" class="nav-link">Progress</a>
            <a href="/content" class="nav-link">Content Hub</a>
        </div>
    </div>
</nav>

<header class="page-header">
    <div class="page-header-inner">
        <h1>Word Library</h1>
        <p>Browse, search, and manage your entire vocabulary collection.</p>
        <div style="margin-top:1.25rem;display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
            <span id="wordCount" style="font-size:0.8rem;font-weight:700;color:var(--text-muted);background:var(--bg-elevated);border:1px solid var(--border);padding:0.3rem 0.85rem;border-radius:9999px;">0 words</span>
            <button onclick="openAddModal()" class="btn btn-primary" style="padding:0.55rem 1.25rem;font-size:0.875rem;">+ Add Word</button>
        </div>
    </div>
</header>

<main style="max-width:1280px;margin:0 auto;padding:1.75rem 1.5rem;">
    <div class="card-glass" style="padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;flex-wrap:wrap;gap:0.75rem;align-items:center;">
        <input type="text" id="searchInput" placeholder=" Search words…" class="input" oninput="filterWords()" style="flex:1;min-width:200px;background:var(--bg-elevated);">
        <select id="categoryFilter" class="input" style="flex:1;min-width:160px;background:var(--bg-elevated);" onchange="filterWords()">
            <option value="">All Categories</option>
        </select>
        <select id="topicFilter" class="input" style="flex:1;min-width:160px;background:var(--bg-elevated);" onchange="filterWords()">
            <option value="">All Topics</option>
        </select>
        <select id="cefrFilter" class="input" style="flex:1;min-width:140px;background:var(--bg-elevated);" onchange="filterWords()">
            <option value="">All CEFR</option>
            <option>A1</option><option>A2</option><option>B1</option>
            <option>B2</option><option>C1</option><option>C2</option>
        </select>
        <select id="difficultyFilter" class="input" style="flex:1;min-width:160px;background:var(--bg-elevated);" onchange="filterWords()">
            <option value="">All Difficulties</option>
            <option value="BEGINNER">Beginner</option>
            <option value="INTERMEDIATE">Intermediate</option>
            <option value="ADVANCED">Advanced</option>
        </select>
    </div>

    <div id="wordGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;"></div>
    <div id="emptyState" class="hidden" style="text-align:center;padding:4rem 1rem;">
        <div style="font-size:3rem;margin-bottom:0.75rem;"></div>
        <p style="font-size:1.1rem;font-weight:700;color:var(--text);">No words found</p>
        <p style="margin-top:0.3rem;color:var(--text-muted);font-size:0.875rem;">Try different filters or add a new word.</p>
    </div>
</main>

<div id="wordModal" class="hidden" style="position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;">
    <div style="position:absolute;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);" onclick="closeModal()"></div>
    <div class="card-glass animate-fade-up" style="position:relative;z-index:1;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:2rem;">
        <h2 id="modalTitle" class="font-display" style="font-size:1.4rem;font-weight:800;color:var(--text);margin-bottom:1.5rem;"></h2>
        <form id="wordForm" onsubmit="saveWord(event)" novalidate>
            <input type="hidden" id="wordId">
            <div style="display:grid;gap:1rem;">
                <div>
                    <label style="display:block;margin-bottom:0.4rem;">English Word *</label>
                    <input type="text" id="wordInput" class="input" placeholder="e.g. Ephemeral" required>
                </div>
                <div>
                    <label style="display:block;margin-bottom:0.4rem;">Vietnamese Meaning *</label>
                    <input type="text" id="translationInput" class="input" placeholder="e.g. Ngắn ngủi, thoáng qua" required>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                    <div>
                        <label style="display:block;margin-bottom:0.4rem;">Pronunciation</label>
                        <input type="text" id="pronunciationInput" class="input" placeholder="/ɪˈfem.ər.əl/">
                    </div>
                    <div>
                        <label style="display:block;margin-bottom:0.4rem;">Difficulty</label>
                        <select id="difficultyInput" class="input">
                            <option value="BEGINNER">Beginner</option>
                            <option value="INTERMEDIATE">Intermediate</option>
                            <option value="ADVANCED">Advanced</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label style="display:block;margin-bottom:0.4rem;">Category</label>
                    <input type="text" id="categoryInput" class="input" list="categoryList" placeholder="e.g. Academic">
                    <datalist id="categoryList"></datalist>
                </div>
                <div>
                    <label style="display:block;margin-bottom:0.4rem;">Example Sentence</label>
                    <input type="text" id="exampleInput" class="input" placeholder="e.g. Fame is ephemeral.">
                </div>
            </div>
            <div style="display:flex;gap:0.75rem;margin-top:1.5rem;">
                <button type="button" onclick="closeModal()" class="btn btn-ghost" style="flex:1;">Cancel</button>
                <button type="submit" class="btn btn-primary" style="flex:2;">Save Word</button>
            </div>
        </form>
    </div>
</div>

<div id="deleteModal" class="hidden" style="position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;">
    <div style="position:absolute;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);" onclick="closeDeleteModal()"></div>
    <div class="card-glass animate-fade-up" style="position:relative;z-index:1;width:100%;max-width:400px;padding:2rem;text-align:center;">
        <div style="font-size:2.5rem;margin-bottom:0.75rem;"></div>
        <h3 class="font-display" style="font-size:1.25rem;font-weight:800;color:var(--text);">Delete this word?</h3>
        <p style="color:var(--text-muted);font-size:0.875rem;margin-top:0.4rem;margin-bottom:1.5rem;">This action cannot be undone.</p>
        <div style="display:flex;gap:0.75rem;justify-content:center;">
            <button onclick="closeDeleteModal()" class="btn btn-ghost">Cancel</button>
            <button id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
        </div>
    </div>
</div>

<script src="/js/vocabulary.js"></script>
</body>
</html>
