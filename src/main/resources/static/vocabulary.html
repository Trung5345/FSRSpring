<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
    <nav class="border-b border-slate-200 bg-white">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4">
            <a href="/" class="font-display text-xl">VocabSmart FSRS</a>
            <div class="hidden gap-5 text-sm font-medium md:flex">
                <a href="/vocabulary" class="text-indigo-700">Vocabulary</a>
                <a href="/learn">Study</a>
                <a href="/quiz">Quiz</a>
                <a href="/progress">Progress</a>
                <a href="/content">Content Hub</a>
                <a href="/flashcards">Flashcards</a>
            </div>
        </div>
    </nav>

    <header class="border-b border-slate-200 bg-white">
        <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-3 px-4 py-6">
            <div>
                <h1 class="font-display text-3xl">Vocabulary Library</h1>
                <p class="mt-1 text-slate-500">Manage learning words and feed FSRS scheduler.</p>
            </div>
            <button onclick="openAddModal()" class="rounded-xl bg-indigo-700 px-5 py-2.5 font-semibold text-white">Add word</button>
        </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-6">
        <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
            <div class="grid grid-cols-1 gap-3 md:grid-cols-4">
                <input id="searchInput" oninput="filterWords()" placeholder="Search word" class="input md:col-span-2">
                <select id="categoryFilter" onchange="filterWords()" class="input"><option value="">All categories</option></select>
                <select id="difficultyFilter" onchange="filterWords()" class="input"><option value="">All levels</option><option value="BEGINNER">Beginner</option><option value="INTERMEDIATE">Intermediate</option><option value="ADVANCED">Advanced</option></select>
            </div>
            <p id="wordCount" class="mt-2 text-sm text-slate-500"></p>
        </div>

        <div id="wordGrid" class="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
        <div id="emptyState" class="hidden py-16 text-center text-slate-500">No vocabulary data yet.</div>
    </main>

    <div id="wordModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/45 p-4">
        <div class="w-full max-w-lg rounded-2xl border border-slate-200 bg-white shadow-2xl">
            <div class="border-b border-slate-200 p-5"><h2 id="modalTitle" class="font-display text-2xl">Add Word</h2></div>
            <form id="wordForm" class="space-y-4 p-5" onsubmit="saveWord(event)">
                <input type="hidden" id="wordId">
                <div><label class="mb-1 block text-sm">Word</label><input id="wordInput" required class="input"></div>
                <div><label class="mb-1 block text-sm">Translation</label><input id="translationInput" required class="input"></div>
                <div><label class="mb-1 block text-sm">Pronunciation</label><input id="pronunciationInput" class="input"></div>
                <div><label class="mb-1 block text-sm">Category</label><input id="categoryInput" list="categoryList" class="input"><datalist id="categoryList"></datalist></div>
                <div><label class="mb-1 block text-sm">Difficulty</label><select id="difficultyInput" class="input"><option value="BEGINNER">Beginner</option><option value="INTERMEDIATE">Intermediate</option><option value="ADVANCED">Advanced</option></select></div>
                <div><label class="mb-1 block text-sm">Example</label><textarea id="exampleInput" rows="2" class="input"></textarea></div>
                <div class="flex gap-3"><button type="button" onclick="closeModal()" class="flex-1 rounded-xl border border-slate-300 py-2">Cancel</button><button type="submit" class="flex-1 rounded-xl bg-indigo-700 py-2 font-semibold text-white">Save</button></div>
            </form>
        </div>
    </div>

    <div id="deleteModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/45 p-4">
        <div class="w-full max-w-sm rounded-2xl border border-slate-200 bg-white p-6 text-center shadow-2xl">
            <h3 class="font-display text-2xl">Delete this word?</h3>
            <p class="mt-2 text-slate-500">This action cannot be undone.</p>
            <div class="mt-4 flex gap-3"><button onclick="closeDeleteModal()" class="flex-1 rounded-xl border border-slate-300 py-2">Cancel</button><button id="confirmDeleteBtn" class="flex-1 rounded-xl bg-rose-600 py-2 font-semibold text-white">Delete</button></div>
        </div>
    </div>

    <script src="/js/vocabulary.js"></script>
</body>
</html>
