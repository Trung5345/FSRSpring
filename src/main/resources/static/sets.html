<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocabulary Sets – FSRSpring Vocab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-base: #080d17; --bg-surface: #0e1524; --bg-elevated: #162035; --bg-card: #1a2640;
      --primary: #2dd4bf; --accent: #fbbf24; --success: #4ade80; --danger: #fb7185;
      --warning: #fb923c; --text-main: #e2e8f0; --text-sub: #94a3b8; --text-dim: #475569; --radius: 16px;
    }
    body { font-family: 'Outfit', sans-serif; background: var(--bg-base); color: var(--text-main); min-height: 100vh; }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; background: var(--bg-surface);
      border-bottom: 1px solid rgba(255,255,255,.06); position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { font-size: 1.1rem; font-weight: 700; color: var(--primary); text-decoration: none; }
    .nav-links { display: flex; gap: 6px; }
    .nav-links a {
      padding: 6px 14px; border-radius: 8px; color: var(--text-sub);
      text-decoration: none; font-size: .875rem; font-weight: 500; transition: all .2s;
    }
    .nav-links a:hover, .nav-links a.active { background: var(--bg-card); color: var(--text-main); }

    .page { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
    .page-title { font-size: 1.7rem; font-weight: 700; }
    .page-sub { color: var(--text-sub); font-size: .9rem; margin-top: 4px; }

    /* Filter tabs */
    .filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; }
    .filter-tab {
      padding: 7px 16px; border-radius: 99px; border: 1px solid rgba(255,255,255,.1);
      background: transparent; color: var(--text-sub); cursor: pointer;
      font-family: 'Outfit', sans-serif; font-size: .82rem; font-weight: 600;
      transition: all .2s; white-space: nowrap;
    }
    .filter-tab:hover, .filter-tab.active {
      background: rgba(45,212,191,.12); border-color: var(--primary); color: var(--primary);
    }

    /* Grid */
    .sets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

    /* Set card */
    .set-card {
      background: var(--bg-card); border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,.06); overflow: hidden;
      cursor: pointer; transition: all .25s;
      display: flex; flex-direction: column;
    }
    .set-card:hover { transform: translateY(-4px); border-color: rgba(45,212,191,.25); box-shadow: 0 16px 40px rgba(0,0,0,.3); }
    .set-card-banner {
      height: 8px;
    }
    .set-card-body { padding: 20px; flex: 1; }
    .set-card-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
    .set-card-desc { color: var(--text-sub); font-size: .83rem; margin-bottom: 12px; line-height: 1.5; }
    .set-meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { padding: 3px 9px; border-radius: 99px; font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .badge-topic { background: rgba(45,212,191,.12); color: var(--primary); }
    .badge-cefr  { background: rgba(251,191,36,.12); color: var(--accent); }
    .badge-count { background: rgba(148,163,184,.1); color: var(--text-sub); }
    .set-card-footer {
      padding: 14px 20px; border-top: 1px solid rgba(255,255,255,.05);
      display: flex; gap: 8px;
    }
    .btn-sm {
      flex: 1; padding: 8px; border-radius: 10px; border: none; cursor: pointer;
      font-family: 'Outfit', sans-serif; font-size: .82rem; font-weight: 600; transition: all .2s;
    }
    .btn-study { background: linear-gradient(135deg, var(--primary), #0ea5e9); color: #000; }
    .btn-view  { background: rgba(255,255,255,.06); color: var(--text-sub); }
    .btn-view:hover { background: rgba(255,255,255,.1); color: var(--text-main); }

    /* Create button */
    .btn-create {
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      color: #000; font-weight: 700; padding: 10px 22px; border-radius: 12px;
      border: none; cursor: pointer; font-family: 'Outfit', sans-serif; font-size: .875rem;
      display: inline-flex; align-items: center; gap: 7px;
    }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-elevated); border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,.1); width: 100%; max-width: 480px;
      margin: 16px; padding: 28px; box-shadow: 0 32px 80px rgba(0,0,0,.5);
    }
    .modal h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }
    .form-row { margin-bottom: 14px; }
    .form-label { font-size: .8rem; font-weight: 600; color: var(--text-sub); margin-bottom: 5px; display: block; }
    .form-input, .form-select {
      width: 100%; background: var(--bg-card); border: 1px solid rgba(255,255,255,.08);
      color: var(--text-main); padding: 10px 12px; border-radius: 10px;
      font-family: 'Outfit', sans-serif; font-size: .9rem;
    }
    .form-input:focus, .form-select:focus { outline: 2px solid var(--primary); border-color: transparent; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel { flex: 1; padding: 10px; background: rgba(255,255,255,.06); color: var(--text-sub); border: none; border-radius: 10px; cursor: pointer; font-family: 'Outfit', sans-serif; font-weight: 600; }
    .btn-save { flex: 2; padding: 10px; background: linear-gradient(135deg, var(--primary), #0ea5e9); color: #000; border: none; border-radius: 10px; cursor: pointer; font-family: 'Outfit', sans-serif; font-weight: 700; }

    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
    .empty-sub { color: var(--text-sub); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" href="/">FSRSpring Vocab</a>
  <div class="nav-links">
    <a href="/">Dashboard</a>
    <a href="/vocabulary">Vocabulary</a>
    <a href="/flashcard-study">Study</a>
    <a href="/sets" class="active">Sets</a>
    <a href="/progress">Progress</a>
    <a href="/quiz">Quiz</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Vocabulary Sets</div>
      <div class="page-sub">Organized collections to study by topic, level, or theme</div>
    </div>
    <button class="btn-create" onclick="openCreateModal()">
      <i data-lucide="plus" style="width:16px;height:16px;"></i> New Set
    </button>
  </div>

  <div class="filter-row" id="cefr-filters">
    <button class="filter-tab active" onclick="filterByCefr(null, this)">All Levels</button>
    <button class="filter-tab" onclick="filterByCefr('A1', this)">A1</button>
    <button class="filter-tab" onclick="filterByCefr('A2', this)">A2</button>
    <button class="filter-tab" onclick="filterByCefr('B1', this)">B1</button>
    <button class="filter-tab" onclick="filterByCefr('B2', this)">B2</button>
    <button class="filter-tab" onclick="filterByCefr('C1', this)">C1</button>
    <button class="filter-tab" onclick="filterByCefr('C2', this)">C2</button>
  </div>

  <div class="sets-grid" id="sets-grid">
    <div class="empty-state" id="empty-state" style="grid-column:1/-1">
      <div class="empty-icon"></div>
      <div class="empty-title">No sets yet</div>
      <div class="empty-sub">Create your first vocabulary set to start studying.</div>
    </div>
  </div>
</div>

<!-- Create Set Modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h2>Create Vocabulary Set</h2>
    <div class="form-row">
      <label class="form-label">Name *</label>
      <input class="form-input" id="f-name" placeholder="e.g. Animals – Beginner">
    </div>
    <div class="form-row">
      <label class="form-label">Description</label>
      <input class="form-input" id="f-desc" placeholder="Optional description">
    </div>
    <div class="form-row">
      <label class="form-label">Topic</label>
      <select class="form-select" id="f-topic">
        <option value="">— No topic —</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">CEFR Level</label>
      <select class="form-select" id="f-cefr">
        <option value="">— Any —</option>
        <option>A1</option><option>A2</option><option>B1</option>
        <option>B2</option><option>C1</option><option>C2</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCreateModal()">Cancel</button>
      <button class="btn-save" onclick="createSet()">Create Set</button>
    </div>
  </div>
</div>

<script>
  lucide.createIcons();

  const CEFR_COLORS = { A1:'#4ade80', A2:'#86efac', B1:'#38bdf8', B2:'#60a5fa', C1:'#a78bfa', C2:'#f472b6' };
  let allSets = [];
  let activeCefr = null;

  async function loadSets(cefrFilter) {
    let url = '/api/sets';
    if (cefrFilter) url += `?cefrLevel=${cefrFilter}`;
    try {
      const res = await fetch(url);
      allSets = await res.json();
      renderSets(allSets);
    } catch(e) { console.error(e); }
  }

  function renderSets(sets) {
    const grid = document.getElementById('sets-grid');
    const empty = document.getElementById('empty-state');
    grid.innerHTML = '';
    if (!sets.length) { grid.appendChild(empty); return; }

    sets.forEach(s => {
      const color = (s.cefrLevel && CEFR_COLORS[s.cefrLevel]) || '#2dd4bf';
      const card = document.createElement('div');
      card.className = 'set-card';
      card.innerHTML = `
        <div class="set-card-banner" style="background:${color}33;border-bottom:2px solid ${color}44"></div>
        <div class="set-card-body">
          <div class="set-card-name">${esc(s.name)}</div>
          <div class="set-card-desc">${esc(s.description || 'No description')}</div>
          <div class="set-meta">
            ${s.topic ? `<span class="badge badge-topic">${esc(s.topic.iconEmoji||'')} ${esc(s.topic.name)}</span>` : ''}
            ${s.cefrLevel ? `<span class="badge badge-cefr">${esc(s.cefrLevel)}</span>` : ''}
            <span class="badge badge-count">${s.wordCount ?? 0} words</span>
          </div>
        </div>
        <div class="set-card-footer">
          <button class="btn-sm btn-study" onclick="studySet(${s.id}, event)">Study</button>
          <button class="btn-sm btn-view" onclick="viewSet(${s.id}, event)">View</button>
        </div>
      `;
      grid.appendChild(card);
    });
    lucide.createIcons();
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

  function filterByCefr(cefr, btn) {
    activeCefr = cefr;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadSets(cefr);
  }

  function studySet(id, e) {
    e.stopPropagation();
    // Navigate to flashcard-study filtered by set (future: pass setId)
    window.location.href = '/flashcard-study';
  }

  function viewSet(id, e) {
    e.stopPropagation();
    alert('Set detail view – coming soon!');
  }

  let topics = [];
  async function loadTopics() {
    try {
      const res = await fetch('/api/topics');
      topics = await res.json();
      const sel = document.getElementById('f-topic');
      topics.forEach(t => {
        const o = document.createElement('option');
        o.value = t.id;
        o.textContent = `${t.iconEmoji||''} ${t.name}`;
        sel.appendChild(o);
      });
    } catch(e) {}
  }

  function openCreateModal() { document.getElementById('create-modal').classList.add('open'); }
  function closeCreateModal() { document.getElementById('create-modal').classList.remove('open'); }

  async function createSet() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { alert('Name is required'); return; }
    const topicId = document.getElementById('f-topic').value || null;
    const cefrLevel = document.getElementById('f-cefr').value || null;
    const description = document.getElementById('f-desc').value.trim() || null;

    const body = { name, description, cefrLevel };
    if (topicId) body.topic = { id: parseInt(topicId) };

    try {
      const res = await fetch('/api/sets', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error('Create failed');
      closeCreateModal();
      document.getElementById('f-name').value = '';
      document.getElementById('f-desc').value = '';
      document.getElementById('f-topic').value = '';
      document.getElementById('f-cefr').value = '';
      loadSets(activeCefr);
    } catch(e) { alert('Failed to create set: ' + e.message); }
  }

  loadTopics();
  loadSets(null);
</script>
</body>
</html>
