<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
    <nav class="border-b border-slate-200 bg-white">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4">
            <a href="/" class="font-display text-xl">VocabSmart FSRS</a>
            <div class="hidden gap-5 text-sm font-medium md:flex">
                <a href="/vocabulary">Vocabulary</a>
                <a href="/learn">Study</a>
                <a href="/quiz" class="text-indigo-700">Quiz</a>
                <a href="/progress">Progress</a>
                <a href="/content">Content Hub</a>
                <a href="/flashcards">Flashcards</a>
            </div>
        </div>
    </nav>

    <div id="setupScreen" class="mx-auto max-w-3xl px-4 py-10">
        <div class="rounded-2xl border border-slate-200 bg-white p-8 shadow-sm">
            <h1 class="font-display text-3xl">Adaptive Quiz</h1>
            <p class="mt-2 text-slate-500">Each answer is also sent to the FSRS core.</p>
            <div class="mt-6 grid grid-cols-1 gap-4 md:grid-cols-2">
                <div><label class="mb-1 block text-sm">Category</label><select id="qcategory" class="input"><option value="">All</option></select></div>
                <div><label class="mb-1 block text-sm">Difficulty</label><select id="qdifficulty" class="input"><option value="">All</option><option value="BEGINNER">Beginner</option><option value="INTERMEDIATE">Intermediate</option><option value="ADVANCED">Advanced</option></select></div>
                <div><label class="mb-1 block text-sm">Question count</label><select id="qcount" class="input"><option value="5">5</option><option value="10">10</option><option value="15">15</option><option value="20">20</option></select></div>
                <div><label class="mb-1 block text-sm">Question type</label><select id="qtype" class="input"><option value="en-vi">Choose Vietnamese meaning</option><option value="vi-en">Choose English word</option></select></div>
            </div>
            <button onclick="startQuiz()" class="mt-6 rounded-xl bg-indigo-700 px-6 py-3 font-semibold text-white">Start quiz</button>
        </div>
    </div>

    <div id="quizScreen" class="mx-auto hidden max-w-3xl px-4 py-8">
        <div class="mb-4 flex justify-between text-sm text-slate-600"><span id="quizProgress">0 / 0</span><span>Correct: <span id="qCorrect">0</span> | Wrong: <span id="qIncorrect">0</span></span></div>
        <div class="h-2 rounded-full bg-slate-200"><div id="quizProgressBar" class="h-2 rounded-full bg-indigo-600" style="width:0%"></div></div>

        <div class="mt-6 rounded-2xl border border-slate-200 bg-white p-8 shadow-sm">
            <p id="quizInstruction" class="text-sm text-slate-500"></p>
            <h2 id="questionWord" class="mt-2 text-center text-4xl font-semibold"></h2>
            <p id="questionPronunciation" class="mt-2 text-center text-sm text-indigo-600"></p>
            <p id="questionCategory" class="mt-1 text-center text-xs text-slate-500"></p>
        </div>

        <div id="optionsGrid" class="mt-4 grid grid-cols-1 gap-3 md:grid-cols-2"></div>
        <div id="feedback" class="mt-4 hidden rounded-xl p-4 text-center">
            <p id="feedbackText" class="font-semibold"></p>
            <p id="feedbackSubtext" class="mt-1 text-sm"></p>
        </div>
        <div class="mt-4 text-center"><button id="nextBtn" onclick="nextQuestion()" class="hidden rounded-xl bg-slate-900 px-6 py-2 font-semibold text-white">Next</button></div>
    </div>

    <div id="resultScreen" class="mx-auto hidden max-w-xl px-4 py-10">
        <div class="rounded-2xl border border-slate-200 bg-white p-8 text-center shadow-sm">
            <h2 class="font-display text-3xl">Quiz Result</h2>
            <div id="scoreCircle" class="mx-auto my-6 flex h-32 w-32 items-center justify-center rounded-full border-8">
                <div><p id="scorePercent" class="text-3xl font-semibold"></p><p class="text-xs text-slate-500">Score</p></div>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div class="rounded-xl bg-slate-100 p-3"><p id="rTotal" class="text-2xl font-semibold">0</p><p class="text-xs text-slate-500">Total</p></div>
                <div class="rounded-xl bg-emerald-100 p-3"><p id="rCorrect" class="text-2xl font-semibold text-emerald-700">0</p><p class="text-xs text-emerald-700">Correct</p></div>
                <div class="rounded-xl bg-rose-100 p-3"><p id="rIncorrect" class="text-2xl font-semibold text-rose-700">0</p><p class="text-xs text-rose-700">Wrong</p></div>
            </div>
            <p id="resultMessage" class="mt-4 text-slate-600"></p>
            <div class="mt-6 flex gap-3"><button onclick="resetQuiz()" class="flex-1 rounded-xl border border-slate-300 py-2 font-semibold">Try again</button><a href="/learn" class="flex-1 rounded-xl bg-indigo-700 py-2 font-semibold text-white">Back to study</a></div>
        </div>
    </div>

    <script src="/js/quiz.js"></script>
</body>
</html>
