<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - Linguist</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;700;800&family=Nunito+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode:"class",
      theme:{ extend:{
        colors:{
          "outline":"#6e7881","primary-fixed":"#c8e6ff","primary-fixed-dim":"#88ceff",
          "surface-container-lowest":"#ffffff","surface-container":"#efeded",
          "surface-container-high":"#e9e8e7","surface-container-highest":"#e3e2e2",
          "surface-container-low":"#f5f3f3","surface":"#fbf9f9","surface-variant":"#e3e2e2",
          "on-error":"#ffffff","secondary-container":"#fec700","background":"#fbf9f9",
          "error-container":"#ffdad6","outline-variant":"#bdc8d2","secondary-fixed-dim":"#f4bf00",
          "secondary-fixed":"#ffdf92","on-primary-fixed":"#001e2e","primary":"#006590",
          "on-surface-variant":"#3e4850","on-background":"#1b1c1c","on-surface":"#1b1c1c",
          "on-secondary-container":"#6e5400","on-primary":"#ffffff","on-primary-container":"#00405d",
          "primary-container":"#1cb0f6","on-error-container":"#93000a","inverse-primary":"#88ceff",
          "error":"#ba1a1a","tertiary":"#bb1522","on-tertiary":"#ffffff",
        },
        borderRadius:{ DEFAULT:"0.25rem", lg:"0.5rem", xl:"0.75rem", full:"9999px" },
        spacing:{ xs:"8px", sm:"16px", md:"24px", lg:"32px", xl:"48px", gutter:"16px" },
        fontFamily:{
          "button-text":["Lexend","sans-serif"],"headline-md":["Lexend","sans-serif"],
          "headline-lg":["Lexend","sans-serif"],"body-md":["Nunito Sans","sans-serif"],
          "label-lg":["Lexend","sans-serif"],"body-lg":["Nunito Sans","sans-serif"]
        },
        fontSize:{
          "button-text":["17px",{lineHeight:"1.0",letterSpacing:"0.02em",fontWeight:"700"}],
          "headline-md":["24px",{lineHeight:"1.2",letterSpacing:"-0.01em",fontWeight:"700"}],
          "headline-lg":["32px",{lineHeight:"1.2",letterSpacing:"-0.02em",fontWeight:"700"}],
          "body-md":["17px",{lineHeight:"1.5",fontWeight:"500"}],
          "label-lg":["15px",{lineHeight:"1.0",letterSpacing:"0.05em",fontWeight:"700"}],
          "body-lg":["19px",{lineHeight:"1.5",fontWeight:"500"}]
        }
      }}
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .quiz-option {
      display:flex; align-items:center; gap:12px; width:100%; padding:16px 20px;
      background:#fff; border:2px solid #bdc8d2; border-radius:12px;
      font-family:Nunito Sans,sans-serif; font-size:17px; font-weight:500;
      color:#1b1c1c; cursor:pointer; text-align:left; transition:border-color .15s, background .15s;
    }
    .quiz-option:hover:not(:disabled) { border-color:#006590; background:#f5f3f3; }
    .quiz-option.correct { border-color:#006590 !important; background:#c8e6ff !important; color:#00405d !important; font-weight:700; }
    .quiz-option.incorrect { border-color:#ba1a1a !important; background:#ffdad6 !important; color:#93000a !important; font-weight:700; }
    .quiz-option:disabled { cursor:default; }
    .quiz-option-letter {
      min-width:28px; height:28px; border-radius:8px; background:#efeded; color:#3e4850;
      display:flex; align-items:center; justify-content:center;
      font-family:Lexend,sans-serif; font-size:13px; font-weight:700; flex-shrink:0;
    }
    .quiz-option.correct .quiz-option-letter { background:#006590; color:#fff; }
    .quiz-option.incorrect .quiz-option-letter { background:#ba1a1a; color:#fff; }
    #feedback.correct-fb { background:#c8e6ff; border-color:#006590; }
    #feedback.correct-fb #feedbackText { color:#00405d; }
    #feedback.incorrect-fb { background:#ffdad6; border-color:#ba1a1a; }
    #feedback.incorrect-fb #feedbackText { color:#93000a; }
    #scoreCircle.score-good { background:#c8e6ff; border-color:#006590; }
    #scoreCircle.score-ok { background:#ffdf92; border-color:#6e5400; }
    #scoreCircle.score-low { background:#ffdad6; border-color:#ba1a1a; }
    #scoreCircle.score-good #scorePercent { color:#006590; }
    #scoreCircle.score-ok #scorePercent { color:#6e5400; }
    #scoreCircle.score-low #scorePercent { color:#ba1a1a; }
  </style>
</head>
<body class="bg-background min-h-screen text-on-background font-body-md">

<!-- Sidebar -->
<nav class="fixed left-0 top-0 h-full flex flex-col p-6 w-64 border-r-2 border-outline-variant bg-surface-container-lowest z-50">
  <div class="mb-10">
    <h1 class="text-headline-lg font-headline-lg text-primary font-black">Linguist</h1>
  </div>
  <ul class="flex flex-col flex-1 gap-2">
    <li><a href="/" class="flex items-center gap-4 px-4 py-3 text-on-surface-variant hover:bg-surface-container rounded-xl transition-colors font-label-lg text-label-lg uppercase tracking-wider">
      <span class="material-symbols-outlined">home</span>Home</a></li>
    <li><a href="/vocabulary" class="flex items-center gap-4 px-4 py-3 text-on-surface-variant hover:bg-surface-container rounded-xl transition-colors font-label-lg text-label-lg uppercase tracking-wider">
      <span class="material-symbols-outlined">menu_book</span>Words</a></li>
    <li><a href="/flashcard-study" class="flex items-center gap-4 px-4 py-3 text-on-surface-variant hover:bg-surface-container rounded-xl transition-colors font-label-lg text-label-lg uppercase tracking-wider">
      <span class="material-symbols-outlined">style</span>Flashcards</a></li>
    <li><a href="/quiz" class="flex items-center gap-4 px-4 py-3 bg-primary-fixed text-primary border-2 border-primary rounded-xl font-label-lg text-label-lg uppercase tracking-wider">
      <span class="material-symbols-outlined icon-filled">extension</span>Quiz</a></li>
    <li><a href="/progress" class="flex items-center gap-4 px-4 py-3 text-on-surface-variant hover:bg-surface-container rounded-xl transition-colors font-label-lg text-label-lg uppercase tracking-wider">
      <span class="material-symbols-outlined">leaderboard</span>Progress</a></li>
    <li><a href="/import" class="flex items-center gap-4 px-4 py-3 text-on-surface-variant hover:bg-surface-container rounded-xl transition-colors font-label-lg text-label-lg uppercase tracking-wider">
      <span class="material-symbols-outlined">add_circle</span>Import</a></li>
  </ul>
</nav>

<!-- Top Header -->
<header class="fixed top-0 right-0 left-64 flex justify-between items-center px-xl h-20 z-40 bg-surface-container-lowest border-b-2 border-outline-variant">
  <div class="font-headline-md text-headline-md text-on-surface font-bold">Quiz</div>
  <div class="flex items-center gap-6">
    <button class="flex items-center gap-1.5 hover:opacity-80 transition-opacity">
      <span class="material-symbols-outlined icon-filled text-secondary-fixed-dim text-2xl">local_fire_department</span>
      <span id="streakCount" class="text-secondary-fixed-dim font-bold font-label-lg text-label-lg">0</span>
    </button>
    <button class="flex items-center gap-1.5 hover:opacity-80 transition-opacity">
      <span class="material-symbols-outlined icon-filled text-primary-container text-2xl">diamond</span>
      <span class="text-primary-container font-bold font-label-lg text-label-lg">0</span>
    </button>
    <button class="hover:opacity-80 transition-opacity">
      <span class="material-symbols-outlined text-on-surface-variant text-2xl">notifications</span>
    </button>
  </div>
</header>

<!-- Main Content -->
<main class="ml-64 mt-20 min-h-screen bg-background p-xl">

  <!-- SETUP SCREEN -->
  <div id="setupScreen">
    <div class="max-w-lg mx-auto">
      <div class="bg-primary rounded-xl p-lg mb-lg flex items-center gap-md">
        <div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center flex-shrink-0">
          <span class="material-symbols-outlined icon-filled text-primary text-4xl">extension</span>
        </div>
        <div>
          <h2 class="text-headline-md font-headline-md text-on-primary font-bold">Vocabulary Quiz</h2>
          <p class="text-primary-fixed font-body-md text-body-md">Test your knowledge with multiple choice</p>
        </div>
      </div>

      <div class="bg-surface-container-lowest border-2 border-outline-variant rounded-xl p-lg flex flex-col gap-md">
        <h3 class="font-headline-md text-headline-md text-on-surface font-bold">Quiz Setup</h3>
        <div class="flex flex-col gap-xs">
          <label class="font-label-lg text-label-lg text-on-surface-variant uppercase">Category</label>
          <select id="qcategory" class="px-3 py-3 bg-surface-container border-2 border-outline-variant rounded-xl font-body-md text-body-md text-on-surface outline-none focus:border-primary cursor-pointer">
            <option value="">All Categories</option>
          </select>
        </div>
        <div class="flex flex-col gap-xs">
          <label class="font-label-lg text-label-lg text-on-surface-variant uppercase">Difficulty</label>
          <select id="qdifficulty" class="px-3 py-3 bg-surface-container border-2 border-outline-variant rounded-xl font-body-md text-body-md text-on-surface outline-none focus:border-primary cursor-pointer">
            <option value="">All Levels</option>
            <option value="BEGINNER">Beginner</option>
            <option value="INTERMEDIATE">Intermediate</option>
            <option value="ADVANCED">Advanced</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-md">
          <div class="flex flex-col gap-xs">
            <label class="font-label-lg text-label-lg text-on-surface-variant uppercase">Questions</label>
            <input id="qcount" type="number" value="10" min="5" max="50"
              class="px-3 py-3 bg-surface-container border-2 border-outline-variant rounded-xl font-body-md text-body-md text-on-surface outline-none focus:border-primary">
          </div>
          <div class="flex flex-col gap-xs">
            <label class="font-label-lg text-label-lg text-on-surface-variant uppercase">Type</label>
            <select id="qtype" class="px-3 py-3 bg-surface-container border-2 border-outline-variant rounded-xl font-body-md text-body-md text-on-surface outline-none focus:border-primary cursor-pointer">
              <option value="en-vi">EN to VI</option>
              <option value="vi-en">VI to EN</option>
            </select>
          </div>
        </div>
        <button onclick="startQuiz()" style="margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 24px;background:#006590;color:#fff;border:none;border-radius:12px;font-family:Lexend,sans-serif;font-size:17px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 0 0 #004c6e;" onmousedown="this.style.transform='translateY(2px)';this.style.boxShadow='0 2px 0 0 #004c6e';" onmouseup="this.style.transform='';this.style.boxShadow='0 4px 0 0 #004c6e';">
          <span class="material-symbols-outlined">play_arrow</span>Start Quiz
        </button>
      </div>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quizScreen" class="hidden">
    <div class="max-w-xl mx-auto flex flex-col gap-md">
      <!-- Header bar -->
      <div class="flex items-center gap-md">
        <button onclick="resetQuiz()" class="text-on-surface-variant hover:text-on-surface transition-colors">
          <span class="material-symbols-outlined">close</span>
        </button>
        <div class="flex-1 flex items-center gap-sm">
          <div class="flex-1 h-3 bg-surface-container rounded-full overflow-hidden">
            <div id="quizProgressBar" class="h-full bg-primary rounded-full transition-all duration-500" style="width:0%"></div>
          </div>
          <span id="quizProgress" class="font-label-lg text-label-lg text-on-surface-variant whitespace-nowrap">0 / 0</span>
        </div>
      </div>

      <!-- Correct/Incorrect counters -->
      <div class="flex gap-md">
        <div class="flex-1 flex items-center justify-center gap-sm bg-error-container rounded-xl py-sm">
          <span class="material-symbols-outlined text-on-error-container">close</span>
          <span id="qIncorrect" class="font-headline-md text-headline-md text-on-error-container font-black">0</span>
        </div>
        <div class="flex-1 flex items-center justify-center gap-sm bg-primary-fixed rounded-xl py-sm">
          <span class="material-symbols-outlined text-primary">check</span>
          <span id="qCorrect" class="font-headline-md text-headline-md text-primary font-black">0</span>
        </div>
      </div>

      <!-- Question Card -->
      <div class="bg-surface-container-lowest border-2 border-outline-variant rounded-xl p-lg flex flex-col items-center gap-sm text-center">
        <p id="quizInstruction" class="font-label-lg text-label-lg text-on-surface-variant uppercase"></p>
        <p id="questionWord" class="font-headline-lg text-headline-lg text-on-surface font-black leading-tight"></p>
        <p id="questionPronunciation" class="font-body-md text-body-md text-primary font-mono"></p>
        <span id="questionCategory" class="font-label-lg text-label-lg text-on-surface-variant uppercase"></span>
      </div>

      <!-- Options -->
      <div id="optionsGrid" class="grid grid-cols-2 gap-sm"></div>

      <!-- Feedback -->
      <div id="feedback" class="hidden rounded-xl border-2 p-md flex flex-col gap-xs">
        <p id="feedbackText" class="font-headline-md text-headline-md font-bold"></p>
        <p id="feedbackSubtext" class="font-body-md text-body-md text-on-surface-variant italic"></p>
      </div>

      <!-- Next Button -->
      <button id="nextBtn" onclick="nextQuestion()" class="hidden" style="display:none;width:100%;padding:14px;background:#006590;color:#fff;border:none;border-radius:12px;font-family:Lexend,sans-serif;font-size:17px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 0 0 #004c6e;" onmousedown="this.style.transform='translateY(2px)';this.style.boxShadow='0 2px 0 0 #004c6e';" onmouseup="this.style.transform='';this.style.boxShadow='0 4px 0 0 #004c6e';">
        Next Question
      </button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="resultScreen" class="hidden">
    <div class="max-w-lg mx-auto">
      <div class="bg-surface-container-lowest border-2 border-outline-variant rounded-xl p-xl flex flex-col items-center gap-lg text-center">
        <div id="scoreCircle" class="w-36 h-36 rounded-full border-4 border-outline-variant flex flex-col items-center justify-center gap-1">
          <span id="scorePercent" class="font-headline-lg text-headline-lg font-black text-on-surface" style="font-size:36px;">0%</span>
          <span class="font-label-lg text-label-lg text-on-surface-variant uppercase">Score</span>
        </div>
        <div>
          <h2 class="text-headline-lg font-headline-lg text-on-surface font-black mb-sm">Quiz Complete!</h2>
          <p id="resultMessage" class="text-on-surface-variant font-body-md text-body-md"></p>
        </div>
        <div class="grid grid-cols-3 gap-md w-full">
          <div class="flex flex-col items-center gap-xs bg-surface-container rounded-xl py-md">
            <span class="font-headline-md text-headline-md text-on-surface font-black" id="rTotal">0</span>
            <span class="font-label-lg text-label-lg text-on-surface-variant uppercase">Total</span>
          </div>
          <div class="flex flex-col items-center gap-xs bg-primary-fixed rounded-xl py-md">
            <span class="font-headline-md text-headline-md text-primary font-black" id="rCorrect">0</span>
            <span class="font-label-lg text-label-lg text-on-surface-variant uppercase">Correct</span>
          </div>
          <div class="flex flex-col items-center gap-xs bg-error-container rounded-xl py-md">
            <span class="font-headline-md text-headline-md text-error font-black" id="rIncorrect">0</span>
            <span class="font-label-lg text-label-lg text-on-surface-variant uppercase">Wrong</span>
          </div>
        </div>
        <div class="flex gap-sm w-full">
          <button onclick="resetQuiz()" style="flex:1;padding:14px;background:#006590;color:#fff;border:none;border-radius:12px;font-family:Lexend,sans-serif;font-size:17px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 0 0 #004c6e;" onmousedown="this.style.transform='translateY(2px)';this.style.boxShadow='0 2px 0 0 #004c6e';" onmouseup="this.style.transform='';this.style.boxShadow='0 4px 0 0 #004c6e';">
            Play Again
          </button>
          <a href="/" style="flex:1;padding:14px;background:#fff;color:#006590;border:2px solid #bdc8d2;border-radius:12px;font-family:Lexend,sans-serif;font-size:17px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;cursor:pointer;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;">
            Go Home
          </a>
        </div>
      </div>
    </div>
  </div>

</main>

<script>
fetch('/api/streak').then(r=>r.json()).then(d=>{
  const el = document.getElementById('streakCount');
  if(el) el.textContent = d.currentStreak ?? 0;
}).catch(()=>{});

// nextBtn hidden class fix — quiz.js uses classList.remove('hidden') but button also has style.display
// Patch nextBtn toggling to work with both mechanisms
document.addEventListener('DOMContentLoaded', () => {
  const orig = document.getElementById('nextBtn');
  if (orig) {
    // Override classList.remove to also set display
    const _remove = orig.classList.remove.bind(orig.classList);
    orig.classList.remove = function(...args) {
      _remove(...args);
      if (args.includes('hidden')) this.style.display = 'block';
    };
    const _add = orig.classList.add.bind(orig.classList);
    orig.classList.add = function(...args) {
      _add(...args);
      if (args.includes('hidden')) this.style.display = 'none';
    };
  }
});
</script>
<script src="/js/quiz.js"></script>
<script src="/js/notifications.js"></script>
</body>
</html>
